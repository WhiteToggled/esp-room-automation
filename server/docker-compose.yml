services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-automation}
      POSTGRES_USER: ${POSTGRES_USER:-automation}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-automation} -d ${POSTGRES_DB:-automation}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mqtt-broker:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "9001:9001" # MQTT over WebSocket — LAN only, not tunneled
    environment:
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
    entrypoint: ["/mosquitto-entrypoint.sh"]
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto-entrypoint.sh:/mosquitto-entrypoint.sh
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - server

  server:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000" # HTTP API — also exposed via Cloudflare tunnel
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-automation}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-automation}
      MQTT_BROKER: mqtt-broker
      MQTT_PORT: "9001"
      MQTT_TRANSPORT: websockets
      TZ: Asia/Karachi
    depends_on:
      db:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
    volumes:
      - firmware-data:/app/firmware

volumes:
  db-data:
  mosquitto-data:
  mosquitto-log:
  firmware-data:
